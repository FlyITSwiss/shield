name: Deploy SHIELD to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement de deploiement'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging

env:
  APP_NAME: shield
  VPS_HOST: stabilis-it.ch
  VPS_USER: 'debian'
  VPS_PATH: /var/www/shield
  PHP_VERSION: '8.4'

jobs:
  # Phase 1: Validation
  validate:
    name: Validation PHP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, curl, zip, pdo_mysql, redis
          tools: composer:v2

      - name: Validate PHP syntax
        run: |
          find backend/php -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Check i18n synchronization
        run: |
          if [ -f "scripts/i18n-validator.js" ]; then
            node scripts/i18n-validator.js
          fi

  # Phase 2: Deploy Webapp
  deploy-webapp:
    name: Deploy Webapp
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment directory
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "
            sudo mkdir -p ${{ env.VPS_PATH }}/backend/php
            sudo mkdir -p ${{ env.VPS_PATH }}/public/uploads
            sudo mkdir -p ${{ env.VPS_PATH }}/storage/logs
            sudo mkdir -p ${{ env.VPS_PATH }}/database/migrations
            sudo mkdir -p ${{ env.VPS_PATH }}/scripts
            sudo chown -R debian:debian ${{ env.VPS_PATH }}
          "

      - name: Deploy composer files
        run: |
          rsync -avz composer.json ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.VPS_PATH }}/
          if [ -f composer.lock ]; then
            rsync -avz composer.lock ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.VPS_PATH }}/
          fi

      - name: Deploy backend PHP
        run: |
          rsync -avz --delete \
            --exclude='vendor' \
            --exclude='*.log' \
            backend/php/ ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.VPS_PATH }}/backend/php/

      - name: Deploy public assets
        run: |
          rsync -avz --delete \
            --exclude='uploads/*' \
            public/ ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.VPS_PATH }}/public/

      - name: Deploy database migrations
        run: |
          rsync -avz \
            database/migrations/ ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.VPS_PATH }}/database/migrations/

      - name: Deploy setup script
        run: |
          rsync -avz \
            scripts/setup-database.sh ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.VPS_PATH }}/scripts/

      - name: Setup database
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "
            echo '→ Running database setup...'
            sudo bash ${{ env.VPS_PATH }}/scripts/setup-database.sh
          "

      - name: Deploy nginx snippet
        run: |
          rsync -avz \
            docker/nginx-shield.conf ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:/tmp/nginx-shield.conf

          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "
            sudo mv /tmp/nginx-shield.conf /etc/nginx/snippets/shield.conf
            sudo nginx -t && sudo systemctl reload nginx
          "

      - name: Install Composer dependencies
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "
            cd ${{ env.VPS_PATH }}

            # Install composer in the project directory if not present
            if ! command -v composer &> /dev/null && [ ! -f ./composer.phar ]; then
              echo '→ Installing Composer locally...'
              php -r \"copy('https://getcomposer.org/installer', 'composer-setup.php');\"
              php composer-setup.php
              rm composer-setup.php
            fi

            if [ -f composer.json ]; then
              if command -v composer &> /dev/null; then
                composer install --no-dev --optimize-autoloader
              else
                php ./composer.phar install --no-dev --optimize-autoloader
              fi
            fi
          "

      - name: Create production .env
        run: |
          # Ensure debian can write to directory first
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "sudo chown -R debian:debian ${{ env.VPS_PATH }}"

          cat > /tmp/shield.env << EOF
          APP_ENV=production
          APP_DEBUG=false
          BASE_PATH=/internal/shield
          DB_HOST=localhost
          DB_PORT=3306
          DB_DATABASE=shield
          DB_USERNAME=shield
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          SMTP_HOST=smtp.office365.com
          SMTP_PORT=587
          SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF

          scp /tmp/shield.env ${{ env.VPS_USER }}@${{ env.VPS_HOST }}:${{ env.VPS_PATH }}/.env
          rm /tmp/shield.env

          # Create production marker
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "touch ${{ env.VPS_PATH }}/.production"

      - name: Set permissions
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "
            sudo chown -R www-data:www-data ${{ env.VPS_PATH }}
            sudo chmod -R 755 ${{ env.VPS_PATH }}
            sudo chmod -R 775 ${{ env.VPS_PATH }}/public/uploads
            sudo chmod -R 775 ${{ env.VPS_PATH }}/storage
          "

      - name: Clear cache
        run: |
          ssh ${{ env.VPS_USER }}@${{ env.VPS_HOST }} "
            if [ -f ${{ env.VPS_PATH }}/storage/cache/app.cache ]; then
              rm -f ${{ env.VPS_PATH }}/storage/cache/app.cache
            fi
          "

  # Phase 3: Health Check
  health-check:
    name: Health Check
    needs: deploy-webapp
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 10

      - name: Check HTTP 200
        run: |
          response=$(curl -sI https://${{ env.VPS_HOST }}/internal/shield/health | head -n1)
          if [[ "$response" != *"200"* ]]; then
            echo "Health check failed: $response"
            exit 1
          fi
          echo "Health check passed: $response"

      - name: Check login page accessible
        run: |
          response=$(curl -sI https://${{ env.VPS_HOST }}/internal/shield/auth/login | head -n1)
          if [[ "$response" != *"200"* ]]; then
            echo "Login page check failed: $response"
            exit 1
          fi
          echo "Login page accessible: $response"

  # Phase 4: Notification
  notify:
    name: Notification
    needs: health-check
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send success notification
        if: ${{ needs.health-check.result == 'success' }}
        run: |
          echo "SHIELD deployed successfully to ${{ env.VPS_HOST }}/internal/shield"

      - name: Send failure notification
        if: ${{ needs.health-check.result == 'failure' }}
        run: |
          echo "SHIELD deployment failed!"
          exit 1
