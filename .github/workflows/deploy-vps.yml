name: Deploy Shield to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  VPS_HOST: '83.228.205.222'
  VPS_USER: 'debian'
  REMOTE_PATH: '/var/www/shield'
  DOMAIN: 'stabilis-it.ch'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to VPS
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          cat >> ~/.ssh/config << EOF
          Host vps
            HostName ${{ env.VPS_HOST }}
            User ${{ env.VPS_USER }}
            IdentityFile ~/.ssh/id_rsa
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config
          
      - name: Deploy with rsync
        run: |
          rsync -avz --delete             --exclude='.git'             --exclude='.github'             --exclude='node_modules'             --exclude='vendor'             --exclude='tests'             --exclude='.env*'             -e ssh             ./ vps:${{ env.REMOTE_PATH }}/
          
      - name: Set permissions and restart
        run: |
          ssh vps "cd ${{ env.REMOTE_PATH }} && sudo chown -R www-data:www-data . && sudo chmod -R 755 ."

  verify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Health check
        run: |
          sleep 5
          STATUS=$(curl -sI https://${{ env.DOMAIN }}/internal/shield/auth/login | head -1 | cut -d" " -f2)
          echo "Health check: HTTP $STATUS"
          [ "$STATUS" = "200" ] || exit 1
