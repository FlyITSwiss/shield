# SHIELD - Snippet Nginx pour VPS Production
# Fichier: /etc/nginx/snippets/shield.conf
# Include dans: /etc/nginx/sites-enabled/helios (config HOST principale)
#
# REGLE: SHIELD ne modifie JAMAIS les configs des autres projets
# SHIELD gere UNIQUEMENT ce snippet

# Health check endpoint (priorite haute, sans PHP)
location = /internal/shield/health {
    access_log off;
    return 200 'SHIELD OK';
    add_header Content-Type text/plain;
}

# API endpoints PHP (priorite haute)
location ~ ^/internal/shield/api/(.+\.php)$ {
    set $api_script /var/www/shield/public/api/$1;
    fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $api_script;
    fastcgi_param SCRIPT_NAME /internal/shield/api/$1;
    fastcgi_param REQUEST_URI $request_uri;
    fastcgi_param QUERY_STRING $query_string;
    include fastcgi_params;

    # Headers CORS pour API mobile
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token, X-Requested-With" always;

    # Preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Timeouts pour appels API IA
    fastcgi_read_timeout 120s;
    fastcgi_send_timeout 120s;
}

# Fichiers statiques (CSS, JS, images)
location ~ ^/internal/shield/assets/(.+)$ {
    alias /var/www/shield/public/assets/$1;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# Uploads utilisateurs
location ~ ^/internal/shield/uploads/(.+)$ {
    alias /var/www/shield/public/uploads/$1;
    expires 7d;
    add_header Cache-Control "public";
}

# Service Worker (PWA) - doit etre servi depuis la racine de l'app
location = /internal/shield/service-worker.js {
    alias /var/www/shield/public/service-worker.js;
    add_header Cache-Control "no-cache";
    add_header Service-Worker-Allowed "/internal/shield/";
}

# Manifest PWA (dynamique via PHP)
location = /internal/shield/manifest.php {
    fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME /var/www/shield/public/manifest.php;
    fastcgi_param SCRIPT_NAME /internal/shield/manifest.php;
    fastcgi_param REQUEST_URI $request_uri;
    include fastcgi_params;
    add_header Cache-Control "public, max-age=86400";
}

# Legacy manifest.json redirect
location = /internal/shield/manifest.json {
    return 301 /internal/shield/manifest.php;
}

# Location principale - Front Controller PHP
location ~ ^/internal/shield(/.*)?$ {
    # Strip le prefix /internal/shield pour obtenir le path interne
    set $shield_path $1;
    if ($shield_path = "") {
        set $shield_path "/";
    }

    # Toutes les requetes vont au front controller
    fastcgi_pass unix:/var/run/php/php8.4-fpm.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME /var/www/shield/public/index.php;
    fastcgi_param SCRIPT_NAME /internal/shield/index.php;
    fastcgi_param REQUEST_URI $request_uri;
    fastcgi_param QUERY_STRING $query_string;
    fastcgi_param PATH_INFO $shield_path;
    include fastcgi_params;

    # Timeouts etendus pour appels IA
    fastcgi_read_timeout 120s;
    fastcgi_send_timeout 120s;
}
