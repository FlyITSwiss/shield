# SHIELD - Snippet Nginx pour VPS Production
# Fichier: /etc/nginx/snippets/shield.conf
# Include dans: /etc/nginx/sites-enabled/helios (config HOST principale)
#
# REGLE: SHIELD ne modifie JAMAIS les configs des autres projets
# SHIELD gere UNIQUEMENT ce snippet

# Health check endpoint (priorite haute, sans PHP)
location = /internal/shield/health {
    access_log off;
    return 200 'SHIELD OK';
    add_header Content-Type text/plain;
}

# Fichiers statiques (CSS, JS, images) - priorite haute
location ~* ^/internal/shield/assets/(.*)$ {
    alias /var/www/shield/public/assets/$1;
    expires 30d;
    add_header Cache-Control "public, immutable";
    access_log off;

    # Fallback si fichier non trouve
    try_files $uri =404;
}

# Uploads utilisateurs
location ~* ^/internal/shield/uploads/(.*)$ {
    alias /var/www/shield/public/uploads/$1;
    expires 7d;
    add_header Cache-Control "public";
    try_files $uri =404;
}

# API endpoints
location ~* ^/internal/shield/api/(.*)\.php$ {
    fastcgi_pass unix:/run/php/php8.2-fpm-shield.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME /var/www/shield/public/api/$1.php;
    include fastcgi_params;

    # Headers CORS pour API mobile
    add_header Access-Control-Allow-Origin "*" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token, X-Requested-With" always;

    # Preflight requests
    if ($request_method = OPTIONS) {
        return 204;
    }

    # Timeouts pour appels API IA
    fastcgi_read_timeout 120s;
    fastcgi_send_timeout 120s;
}

# Location principale pour l'application SHIELD
location ^~ /internal/shield {
    alias /var/www/shield/public;
    index index.php;

    # Toutes les routes non-fichier vers index.php (front controller)
    try_files $uri $uri/ @shield_router;
}

# PHP Router pour SHIELD (front controller pattern)
location @shield_router {
    fastcgi_pass unix:/run/php/php8.2-fpm-shield.sock;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME /var/www/shield/public/index.php;
    fastcgi_param SCRIPT_NAME /internal/shield/index.php;
    fastcgi_param REQUEST_URI $request_uri;
    fastcgi_param QUERY_STRING $query_string;
    include fastcgi_params;

    # Timeouts etendus pour appels IA
    fastcgi_read_timeout 120s;
    fastcgi_send_timeout 120s;
}
