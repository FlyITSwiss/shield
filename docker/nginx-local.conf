# SHIELD - Configuration Nginx pour Docker local
# Environnement de developpement

server {
    listen 80 default_server;
    server_name _;

    root /var/www/shield/public;
    index index.php index.html;

    # Charset
    charset utf-8;

    # Logs
    access_log /var/log/nginx/shield_access.log;
    error_log /var/log/nginx/shield_error.log;

    # Taille max upload (pour photos profil, preuves)
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Fichiers statiques (CSS, JS, images, audio)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|wav|mp3|ogg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # PWA files
    location = /manifest.json {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # Uploads
    location /uploads/ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # API endpoints
    location /api/ {
        try_files $uri $uri/ /api/index.php?$query_string;

        # CORS headers
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-CSRF-Token" always;

        if ($request_method = OPTIONS) {
            return 204;
        }
    }

    # Health check
    location = /health {
        access_log off;
        return 200 'SHIELD OK';
        add_header Content-Type text/plain;
    }

    # PHP files
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeouts pour appels IA (Twilio, OpenAI, etc.)
        fastcgi_read_timeout 120s;
        fastcgi_send_timeout 120s;
    }

    # SPA routing - Toutes les autres requests vers index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Bloquer l'acces aux fichiers sensibles
    location ~ /\. {
        deny all;
    }

    location ~ ^/(backend|storage|database|docker|tests)/ {
        deny all;
    }
}
