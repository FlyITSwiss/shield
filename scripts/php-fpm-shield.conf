; SHIELD - PHP-FPM Pool Configuration
; Fichier: /etc/php/8.2/fpm/pool.d/shield.conf
;
; Configuration optimisée pour application mobile de sécurité
; - Réponse rapide pour les alertes SOS
; - Timeouts étendus pour les appels IA

[shield]
; Utilisateur et groupe
user = www-data
group = www-data

; Socket Unix (plus rapide que TCP)
listen = /run/php/php8.2-fpm-shield.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Process Manager - dynamic pour adaptation charge
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 8
pm.max_requests = 500

; Timeouts
request_terminate_timeout = 120s
request_slowlog_timeout = 30s

; Logs
access.log = /var/log/php-fpm/shield-access.log
slowlog = /var/log/php-fpm/shield-slow.log

; Sécurité
security.limit_extensions = .php

; Variables d'environnement
clear_env = no

; Catch worker output
catch_workers_output = yes
decorate_workers_output = no

; Chroot (optionnel, pour sécurité renforcée)
; chroot = /var/www/shield
; chdir = /public

; PHP settings spécifiques à SHIELD
php_admin_value[error_log] = /var/log/php-fpm/shield-error.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 256M
php_admin_value[max_execution_time] = 120
php_admin_value[max_input_time] = 60
php_admin_value[post_max_size] = 25M
php_admin_value[upload_max_filesize] = 20M

; Session configuration
php_value[session.save_handler] = files
php_value[session.save_path] = /var/www/shield/storage/sessions
php_value[session.gc_maxlifetime] = 86400

; Opcache (performances)
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 128
php_admin_value[opcache.interned_strings_buffer] = 8
php_admin_value[opcache.max_accelerated_files] = 4000
php_admin_value[opcache.revalidate_freq] = 60
php_admin_value[opcache.fast_shutdown] = 1
